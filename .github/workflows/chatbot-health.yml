name: Chatbot Health

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      site:
        description: 'Site id from config/chatbots/sites.json'
        required: false
        default: qamiluna

permissions:
  contents: read
  issues: write

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SITE_ID: ${{ github.event.inputs.site || 'qamiluna' }}
      N8N_BASE_URL: ${{ vars.N8N_BASE_URL || 'https://n8n.qamilunastudio.com' }}
      N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
      N8N_QAMILUNA_INSTANCE: ${{ secrets.N8N_QAMILUNA_INSTANCE }}
      EVOLUTION_API_BASE_URL: ${{ vars.EVOLUTION_API_BASE_URL || 'https://qamiluna-evolution-api.onrender.com' }}
      EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY }}
      EVOLUTION_INSTANCE_NAME: ${{ vars.EVOLUTION_INSTANCE_NAME || 'qamiluna-test' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run chatbot health check
        id: health
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path var/tmp/chatbot-health | Out-Null
          ./tools/chatbots/Test-ChatbotDeployment.ps1 -Site $env:SITE_ID -Json `
            | Tee-Object -FilePath var/tmp/chatbot-health/result.json

      - name: Upload health result
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: chatbot-health-${{ env.SITE_ID }}
          path: var/tmp/chatbot-health/result.json
          retention-days: 14

      - name: Open or update alert issue
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = 'var/tmp/chatbot-health/result.json';
            const site = process.env.SITE_ID || 'qamiluna';
            const body = fs.existsSync(path)
              ? fs.readFileSync(path, 'utf8')
              : 'Health check did not produce result.json';
            const title = `[ops-alert] Chatbot health failed: ${site}`;
            const { owner, repo } = context.repo;
            try {
              await github.rest.issues.getLabel({ owner, repo, name: 'ops-alert' });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: 'ops-alert',
                  color: 'd73a4a',
                  description: 'Operational alert generated by scheduled health checks',
                });
              } else {
                throw error;
              }
            }
            const issues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'ops-alert',
              per_page: 100,
            });
            const existing = issues.data.find((issue) => issue.title === title);
            const message = [
              `Scheduled chatbot health check failed for \`${site}\`.`,
              '',
              `Run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              '',
              '```json',
              body.slice(0, 6000),
              '```',
            ].join('\n');
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: message,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body: message,
                labels: ['ops-alert'],
              });
            }
