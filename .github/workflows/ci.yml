name: QS Core CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: xdebug

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Validate project structure
        run: composer run validate:structure

      - name: PHP CS Fixer
        run: vendor/bin/php-cs-fixer fix --dry-run --config=config/quality/.php-cs-fixer.dist.php

      - name: PHPStan
        run: vendor/bin/phpstan analyse --configuration=config/quality/phpstan.neon

      - name: PHPUnit
        run: vendor/bin/phpunit --configuration phpunit.xml.dist --coverage-text

      - name: Prepare mutation reports directory
        if: github.event_name == 'pull_request'
        run: mkdir -p tools/mutation/reports

      - name: Infection Booking
        if: github.event_name == 'pull_request'
        run: vendor/bin/infection --configuration=config/quality/infection-booking.json --threads=4

      - name: Infection Finance
        if: github.event_name == 'pull_request'
        run: vendor/bin/infection --configuration=config/quality/infection-finance.json --threads=4

  package:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: ftp

      - name: Install production dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Validate project structure
        run: composer run validate:structure

      - name: Build plugin package
        run: php tools/package-plugin.php

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: qs-core-package
          path: |
            dist/qs-core
            dist/qs-core.zip

      - name: Deploy to cPanel via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_LOCAL_DIR: dist/qs-core
          FTP_REMOTE_DIR: /
          FTP_STATE_NAME: .ftp-deploy-sync-state.json
        run: |
          php tools/deploy/ftp-sync.php

  deploy_n8n:
    runs-on: ubuntu-latest
    needs: package
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Sync n8n workflows
        env:
          N8N_BASE_URL: ${{ vars.N8N_BASE_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          N8N_QAMILUNA_INSTANCE: ${{ secrets.N8N_QAMILUNA_INSTANCE }}
          N8N_QDRANT_CREDENTIAL_NAME: ${{ vars.N8N_QDRANT_CREDENTIAL_NAME }}
          N8N_HUGGING_FACE_CREDENTIAL_NAME: ${{ vars.N8N_HUGGING_FACE_CREDENTIAL_NAME }}
          N8N_OPENROUTER_CREDENTIAL_NAME: ${{ vars.N8N_OPENROUTER_CREDENTIAL_NAME }}
          N8N_GROQ_CREDENTIAL_NAME: ${{ vars.N8N_GROQ_CREDENTIAL_NAME }}
        run: node tools/n8n/sync_workflows.js
